<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap Maker Sederhana - V3</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f1f2f6; overflow: hidden; }
        
        #toolbar { 
            padding: 10px; background: #ffffff; border-bottom: 2px solid #dfe4ea; 
            position: relative; z-index: 10; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        button { padding: 8px 12px; cursor: pointer; border: 1px solid #ced6e0; background: #f1f2f6; border-radius: 4px; }
        button:hover { background: #dfe4ea; }
        
        input[type="color"] { border: none; width: 30px; height: 30px; padding: 0; cursor: pointer; background: transparent; }

        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(#ced6e0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #garis-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .node {
            position: absolute;
            border: 2px solid rgba(0,0,0,0.2);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: move;
            min-width: 100px;
            text-align: center;
            z-index: 2;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: border-color 0.2s, box-shadow 0.2s; 
        }

        .node.selected {
            border-color: #3742fa;
            box-shadow: 0 0 0 3px rgba(55, 66, 250, 0.3);
            z-index: 3;
        }
        .node:focus { outline: none; cursor: text; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="tambahKotak()">+ Tambah Kotak</button>
        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        
        <label>Warna:</label>
        <input type="color" id="colorPicker" value="#ffeaa7" onchange="ubahWarnaKotak()">
        <button onclick="putusKoneksi()">✂️ Putus Garis</button>
        <button id="btnHubungkan" onclick="mulaiHubungkan()">🔗 Hubungkan ke...</button>
        
        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        <button onclick="hapusData()" style="color: red;">🗑️ Hapus Semua</button>
        
        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        <button onclick="eksporKeFile()">⬇️ Export File (.json)</button>
        <button onclick="document.getElementById('fileUpload').click()">⬆️ Load File</button>
        <input type="file" id="fileUpload" style="display: none;" onchange="imporDariFile(event)" accept=".json">
    </div>

    <div id="canvas">
        <svg id="garis-layer"></svg>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const garisLayer = document.getElementById('garis-layer');
        const colorPicker = document.getElementById('colorPicker');
        const btnHubungkan = document.getElementById('btnHubungkan');
        
        const GRID_SIZE = 40; 
        let mindmapData = [];
        let isDragging = false;
        let draggedNode = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        let selectedNodeId = null; 
        let modeMenghubungkan = false; 

        // --- FUNGSI MEMUAT DATA LOKAL ---
        function muatData() {
            const dataTersimpan = localStorage.getItem('mindmapDataV3');
            if (dataTersimpan) {
                mindmapData = JSON.parse(dataTersimpan);
            } else {
                mindmapData = [{ id: 'node-1', text: 'Ide Utama', x: 120, y: 320, parentId: null, color: '#ffeaa7' }];
            }
            renderSemua();
        }

        // --- FUNGSI RENDER UTAMA ---
        function renderSemua() {
            canvas.querySelectorAll('.node').forEach(e => e.remove());
            garisLayer.innerHTML = '';

            mindmapData.forEach(data => buatElemenKotak(data));
            
            mindmapData.forEach(data => {
                if (data.parentId) gambarGaris(data.parentId, data.id);
            });
        }

        // --- FUNGSI MEMBUAT KOTAK ---
        function buatElemenKotak(data) {
            const div = document.createElement('div');
            div.className = 'node';
            if (data.id === selectedNodeId) div.classList.add('selected'); 
            
            div.id = data.id;
            div.style.left = data.x + 'px';
            div.style.top = data.y + 'px';
            div.style.backgroundColor = data.color || '#ffeaa7';
            div.innerText = data.text;
            div.contentEditable = true;

            div.addEventListener('blur', (e) => { data.text = e.target.innerText; simpanDataOtomatis(); });

            div.addEventListener('mousedown', (e) => {
                if (modeMenghubungkan && selectedNodeId && selectedNodeId !== data.id) {
                    const nodeAnak = mindmapData.find(n => n.id === selectedNodeId);
                    nodeAnak.parentId = data.id;
                    modeMenghubungkan = false;
                    btnHubungkan.innerText = "🔗 Hubungkan ke...";
                    btnHubungkan.style.backgroundColor = "";
                    renderSemua();
                    simpanDataOtomatis();
                    return; 
                }

                pilihKotak(data.id, data.color);
                isDragging = true;
                draggedNode = data;
                dragOffsetX = e.clientX - data.x;
                dragOffsetY = e.clientY - data.y;
            });

            canvas.appendChild(div);
        }

        // --- FUNGSI PILIH KOTAK ---
        function pilihKotak(id, color) {
            selectedNodeId = id;
            if (color) colorPicker.value = color; 
            renderSemua(); 
        }

        // --- FUNGSI MENGGAMBAR GARIS ---
        function gambarGaris(idInduk, idAnak) {
            const elemenInduk = document.getElementById(idInduk);
            const elemenAnak = document.getElementById(idAnak);
            if (!elemenInduk || !elemenAnak) return;

            const dataInduk = mindmapData.find(n => n.id === idInduk);
            const dataAnak = mindmapData.find(n => n.id === idAnak);

            const x1 = dataInduk.x + elemenInduk.offsetWidth; 
            const y1 = dataInduk.y + (elemenInduk.offsetHeight / 2);

            const x2 = dataAnak.x;
            const y2 = dataAnak.y + (elemenAnak.offsetHeight / 2);

            const midX = (x1 + x2) / 2;
            const pathD = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathD);
            path.setAttribute('stroke', '#a4b0be');
            path.setAttribute('stroke-width', '3'); 
            path.setAttribute('fill', 'none');

            garisLayer.appendChild(path);
        }

        // --- LOGIKA MENGGESER ---
        function onMove(clientX, clientY) {
            if (!isDragging || !draggedNode) return;
            
            let rawX = clientX - dragOffsetX;
            let rawY = clientY - dragOffsetY;

            draggedNode.x = Math.round(rawX / GRID_SIZE) * GRID_SIZE;
            draggedNode.y = Math.round(rawY / GRID_SIZE) * GRID_SIZE;
            
            renderSemua();
        }

        window.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => { 
            if(isDragging) simpanDataOtomatis();
            isDragging = false; 
            draggedNode = null; 
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.target === canvas || e.target === garisLayer) {
                selectedNodeId = null;
                modeMenghubungkan = false;
                btnHubungkan.innerText = "🔗 Hubungkan ke...";
                btnHubungkan.style.backgroundColor = "";
                renderSemua();
            }
        });

        // --- FUNGSI-FUNGSI MENU/TOOLBAR ---
        function tambahKotak() {
            const idBaru = 'node-' + Date.now();
            const parentId = selectedNodeId ? selectedNodeId : null; 
            
            mindmapData.push({
                id: idBaru,
                text: 'Kotak Baru',
                x: Math.round(300 / GRID_SIZE) * GRID_SIZE, 
                y: Math.round(100 / GRID_SIZE) * GRID_SIZE,
                parentId: parentId,
                color: '#ffeaa7'
            });
            pilihKotak(idBaru, '#ffeaa7'); 
            simpanDataOtomatis();
        }

        function ubahWarnaKotak() {
            if (!selectedNodeId) return alert("Pilih kotak dulu dengan cara mengkliknya!");
            const node = mindmapData.find(n => n.id === selectedNodeId);
            if (node) {
                node.color = colorPicker.value;
                renderSemua();
                simpanDataOtomatis();
            }
        }

        function putusKoneksi() {
            if (!selectedNodeId) return alert("Pilih kotak yang garisnya mau diputus!");
            const node = mindmapData.find(n => n.id === selectedNodeId);
            if (node) {
                node.parentId = null; 
                renderSemua();
                simpanDataOtomatis();
            }
        }

        function mulaiHubungkan() {
            if (!selectedNodeId) return alert("Pilih kotak awalnya dulu!");
            modeMenghubungkan = true;
            btnHubungkan.innerText = "Klik Kotak Induk/Tujuan...";
            btnHubungkan.style.backgroundColor = "#ffeaa7";
        }

        function simpanDataOtomatis() {
            localStorage.setItem('mindmapDataV3', JSON.stringify(mindmapData));
        }

        function hapusData() {
            if(confirm('Hapus semua dan mulai dari awal?')) {
                localStorage.removeItem('mindmapDataV3');
                mindmapData = [];
                selectedNodeId = null;
                muatData();
            }
        }

        // --- FUNGSI EKSPOR/IMPOR FILE ---
        function eksporKeFile() {
            const dataString = JSON.stringify(mindmapData, null, 2); 
            const blob = new Blob([dataString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "mindmap_kamu.json"; 
            document.body.appendChild(a);
            a.click(); 
            document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        }

        function imporDariFile(event) {
            const file = event.target.files[0];
            if (!file) return; 

            const reader = new FileReader(); 
            
            reader.onload = function(e) {
                try {
                    const dataBaru = JSON.parse(e.target.result);
                    if (Array.isArray(dataBaru)) {
                        mindmapData = dataBaru;
                        simpanDataOtomatis(); 
                        renderSemua(); 
                        alert("Data berhasil dimuat!");
                    } else {
                        alert("Format file tidak valid!");
                    }
                } catch (error) {
                    alert("Terjadi kesalahan saat membaca file JSON.");
                }
            };
            
            reader.readAsText(file); 
            event.target.value = ''; 
        }

        // Inisialisasi awal
        muatData();
    </script>
</body>
</html>
