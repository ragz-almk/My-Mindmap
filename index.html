<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap Maker Sederhana - V4 (Garis Bebas)</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f1f2f6; overflow: hidden; }
        
        #toolbar { 
            padding: 10px; background: #ffffff; border-bottom: 2px solid #dfe4ea; 
            position: relative; z-index: 10; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        button { padding: 8px 12px; cursor: pointer; border: 1px solid #ced6e0; background: #f1f2f6; border-radius: 4px; }
        button:hover { background: #dfe4ea; }
        input[type="color"] { border: none; width: 30px; height: 30px; padding: 0; cursor: pointer; background: transparent; }

        #canvas { position: relative; width: 100vw; height: 100vh; overflow: hidden; 
            background-image: radial-gradient(#ced6e0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Perubahan penting: pointer-events: none pada layer, agar kita bisa klik elemen SVG di dalamnya */
        #garis-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* Agar titik pegangan garis bisa diklik/didrag */
        .handle { pointer-events: auto; cursor: grab; }
        .handle:active { cursor: grabbing; }

        .node {
            position: absolute; border: 2px solid rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 8px;
            cursor: move; min-width: 100px; text-align: center; z-index: 2; user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: border-color 0.2s, box-shadow 0.2s; 
        }
        .node.selected { border-color: #3742fa; box-shadow: 0 0 0 3px rgba(55, 66, 250, 0.3); z-index: 3; }
        .node:focus { outline: none; cursor: text; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="tambahKotak()">+ Tambah Kotak</button>
        <button onclick="tambahGarisManual()">➕ Tambah Garis</button>
        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        
        <label>Warna Kotak:</label>
        <input type="color" id="colorPicker" value="#ffeaa7" onchange="ubahWarnaKotak()">
        <button onclick="hapusTerpilih()" style="color: #e84118; font-weight: bold;">🗑️ Hapus Terpilih</button>
        
        <span style="border-left: 2px solid #ccc; height: 20px; margin: 0 5px;"></span>
        <button onclick="eksporKeFile()">⬇️ Export File</button>
        <button onclick="document.getElementById('fileUpload').click()">⬆️ Load File</button>
        <input type="file" id="fileUpload" style="display: none;" onchange="imporDariFile(event)" accept=".json">
        <button onclick="hapusSemuaData()" style="color: red;">⚠️ Reset Total</button>
    </div>

    <div id="canvas">
        <svg id="garis-layer"></svg>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const garisLayer = document.getElementById('garis-layer');
        const colorPicker = document.getElementById('colorPicker');
        
        const GRID_SIZE = 40; 
        
        // Struktur data baru: memisahkan kotak dan garis
        let appData = { nodes: [], lines: [] };
        
        // Sistem Dragging yang lebih canggih
        let dragInfo = null; // Menyimpan info apa yang sedang digeser (kotak atau ujung garis)
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        
        let selectedNodeId = null; 
        let selectedLineId = null; 

        // --- 1. FUNGSI MEMUAT DATA ---
        function muatData() {
            const dataTersimpan = localStorage.getItem('mindmapDataV4');
            if (dataTersimpan) {
                appData = JSON.parse(dataTersimpan);
            } else {
                // Konversi data V3 ke V4 jika ada, agar project lamamu tidak hilang
                const dataLama = localStorage.getItem('mindmapDataV3');
                if(dataLama) {
                    const oldNodes = JSON.parse(dataLama);
                    appData = { nodes: oldNodes, lines: [] };
                    // Ubah koneksi lama menjadi garis manual
                    oldNodes.forEach(node => {
                        if(node.parentId) {
                            const parent = oldNodes.find(n => n.id === node.parentId);
                            if(parent) {
                                appData.lines.push({
                                    id: 'line-' + Date.now() + Math.random(),
                                    x1: parent.x + 120, y1: parent.y + 20, 
                                    x2: node.x, y2: node.y + 20
                                });
                            }
                        }
                    });
                } else {
                    appData = { 
                        nodes: [{ id: 'node-1', text: 'Ide Utama', x: 120, y: 320, color: '#ffeaa7' }], 
                        lines: [] 
                    };
                }
            }
            renderSemua();
        }

        // --- 2. FUNGSI RENDER UTAMA ---
        function renderSemua() {
            canvas.querySelectorAll('.node').forEach(e => e.remove());
            garisLayer.innerHTML = '';

            appData.nodes.forEach(nodeData => buatElemenKotak(nodeData));
            appData.lines.forEach(lineData => gambarGarisBebas(lineData));
        }

        // --- 3. MEMBUAT KOTAK ---
        function buatElemenKotak(data) {
            const div = document.createElement('div');
            div.className = 'node';
            if (data.id === selectedNodeId) div.classList.add('selected'); 
            
            div.id = data.id;
            div.style.left = data.x + 'px';
            div.style.top = data.y + 'px';
            div.style.backgroundColor = data.color || '#ffeaa7';
            div.innerText = data.text;
            div.contentEditable = true;

            div.addEventListener('blur', (e) => { data.text = e.target.innerText; simpanDataOtomatis(); });

            div.addEventListener('mousedown', (e) => {
                pilihElemen('node', data.id, data.color);
                dragInfo = { type: 'node', id: data.id };
                dragOffsetX = e.clientX - data.x;
                dragOffsetY = e.clientY - data.y;
            });

            canvas.appendChild(div);
        }

        // --- 4. MENGGAMBAR GARIS BEBAS ---
        function gambarGarisBebas(garis) {
            const midX = (garis.x1 + garis.x2) / 2;
            const pathD = `M ${garis.x1} ${garis.y1} C ${midX} ${garis.y1}, ${midX} ${garis.y2}, ${garis.x2} ${garis.y2}`;

            // Gambar jalurnya
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathD);
            // Garis akan berubah biru jika dipilih
            path.setAttribute('stroke', garis.id === selectedLineId ? '#0984e3' : '#a4b0be');
            path.setAttribute('stroke-width', garis.id === selectedLineId ? '5' : '3'); 
            path.setAttribute('fill', 'none');
            garisLayer.appendChild(path);

            // Gambar pegangan (handle) titik Awal
            buatHandle(garis.x1, garis.y1, '#2ecc71', garis.id, 'start'); // Hijau untuk awal
            // Gambar pegangan (handle) titik Akhir
            buatHandle(garis.x2, garis.y2, '#e74c3c', garis.id, 'end');   // Merah untuk akhir
        }

        function buatHandle(x, y, warna, idGaris, pointType) {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', '8'); // Ukuran bulatan
            circle.setAttribute('fill', warna);
            circle.setAttribute('class', 'handle');
            
            circle.addEventListener('mousedown', (e) => {
                e.stopPropagation(); // Agar tidak men-trigger klik kanvas
                pilihElemen('line', idGaris, null);
                dragInfo = { type: pointType, id: idGaris };
            });
            
            garisLayer.appendChild(circle);
        }

        // --- 5. LOGIKA MEMILIH & DRAGGING ---
        function pilihElemen(tipe, id, color) {
            if (tipe === 'node') {
                selectedNodeId = id; selectedLineId = null;
                if (color) colorPicker.value = color; 
            } else if (tipe === 'line') {
                selectedLineId = id; selectedNodeId = null;
            }
            renderSemua(); 
        }

        function onMove(clientX, clientY) {
            if (!dragInfo) return;
            
            // Mengubah posisi kursor menjadi posisi di kanvas & menjadikannya menempel ke grid (Snap)
            const rawX = clientX;
            const rawY = clientY;
            const snappedX = Math.round(rawX / GRID_SIZE) * GRID_SIZE;
            const snappedY = Math.round(rawY / GRID_SIZE) * GRID_SIZE;

            if (dragInfo.type === 'node') {
                const node = appData.nodes.find(n => n.id === dragInfo.id);
                if (node) {
                    node.x = Math.round((clientX - dragOffsetX) / GRID_SIZE) * GRID_SIZE;
                    node.y = Math.round((clientY - dragOffsetY) / GRID_SIZE) * GRID_SIZE;
                }
            } 
            else if (dragInfo.type === 'start') {
                const line = appData.lines.find(l => l.id === dragInfo.id);
                if (line) { line.x1 = snappedX; line.y1 = snappedY; }
            } 
            else if (dragInfo.type === 'end') {
                const line = appData.lines.find(l => l.id === dragInfo.id);
                if (line) { line.x2 = snappedX; line.y2 = snappedY; }
            }
            
            renderSemua();
        }

        window.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => { 
            if(dragInfo) simpanDataOtomatis();
            dragInfo = null; 
        });

        // Klik kekosongan kanvas
        canvas.addEventListener('mousedown', (e) => {
            if (e.target === canvas || e.target === garisLayer) {
                selectedNodeId = null; selectedLineId = null;
                renderSemua();
            }
        });

        // --- 6. MENU & TOMBOL KONTROL ---
        function tambahKotak() {
            appData.nodes.push({
                id: 'node-' + Date.now(), text: 'Kotak Baru',
                x: Math.round(300 / GRID_SIZE) * GRID_SIZE, y: Math.round(100 / GRID_SIZE) * GRID_SIZE,
                color: '#ffeaa7'
            });
            simpanDataOtomatis(); renderSemua();
        }

        function tambahGarisManual() {
            appData.lines.push({
                id: 'line-' + Date.now(),
                x1: 200, y1: 200, // Koordinat awal
                x2: 400, y2: 200  // Koordinat akhir
            });
            simpanDataOtomatis(); renderSemua();
        }

        function ubahWarnaKotak() {
            if (selectedNodeId) {
                const node = appData.nodes.find(n => n.id === selectedNodeId);
                if (node) { node.color = colorPicker.value; simpanDataOtomatis(); renderSemua(); }
            }
        }

        function hapusTerpilih() {
            if (selectedNodeId) {
                appData.nodes = appData.nodes.filter(n => n.id !== selectedNodeId);
                selectedNodeId = null;
            } else if (selectedLineId) {
                appData.lines = appData.lines.filter(l => l.id !== selectedLineId);
                selectedLineId = null;
            } else {
                alert("Klik kotak atau titik ujung garis terlebih dahulu sebelum menghapus.");
                return;
            }
            simpanDataOtomatis(); renderSemua();
        }

        function simpanDataOtomatis() {
            localStorage.setItem('mindmapDataV4', JSON.stringify(appData));
        }

        function hapusSemuaData() {
            if(confirm('Hapus semua dan mulai dari awal?')) {
                localStorage.removeItem('mindmapDataV4'); localStorage.removeItem('mindmapDataV3');
                appData = { nodes: [], lines: [] }; selectedNodeId = null; selectedLineId = null;
                muatData();
            }
        }

        // --- 7. FUNGSI EKSPOR/IMPOR FILE ---
        function eksporKeFile() {
            const dataString = JSON.stringify(appData, null, 2); 
            const blob = new Blob([dataString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url; a.download = "mindmap_bebas.json"; 
            document.body.appendChild(a); a.click(); document.body.removeChild(a); 
            URL.revokeObjectURL(url);
        }

        function imporDariFile(event) {
            const file = event.target.files[0];
            if (!file) return; 

            const reader = new FileReader(); 
            reader.onload = function(e) {
                try {
                    const dataBaru = JSON.parse(e.target.result);
                    // Pastikan formatnya sesuai yang baru (memiliki nodes dan lines)
                    if (dataBaru && Array.isArray(dataBaru.nodes)) {
                        appData = dataBaru; simpanDataOtomatis(); renderSemua(); alert("Data berhasil dimuat!");
                    } else { alert("Format file tidak valid!"); }
                } catch (error) { alert("Terjadi kesalahan saat membaca file JSON."); }
            };
            reader.readAsText(file); event.target.value = ''; 
        }

        muatData();
    </script>
</body>
</html>
