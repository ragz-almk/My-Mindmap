<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindmap App PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617"> <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="w-full h-screen bg-slate-950 overflow-hidden touch-none relative font-sans text-slate-200">

    <div id="app-container" class="w-full h-full absolute inset-0">
        <div id="bg-grid" class="absolute inset-0 pointer-events-none opacity-20"></div>

        <div id="canvas-layer" class="absolute origin-top-left">
            <svg id="edges-layer" class="absolute top-0 left-0 overflow-visible pointer-events-none"></svg>
            <div id="nodes-layer"></div>
        </div>
    </div>

    <div id="connect-message" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-yellow-500/20 text-yellow-300 px-6 py-2 rounded-full border border-yellow-500/50 backdrop-blur-md text-sm font-medium shadow-xl pointer-events-none animate-bounce z-50">
        Tap kotak pertama
    </div>

    <div id="node-toolbar" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 flex bg-slate-800 p-2 rounded-2xl shadow-xl border border-slate-700 backdrop-blur-md gap-2 items-center z-50">
        <div id="color-picker" class="flex gap-1 px-2 border-r border-slate-600"></div>
        <button id="btn-delete" class="p-2 text-red-400 hover:bg-slate-700 rounded-xl transition-colors">
            <i data-lucide="trash-2"></i>
        </button>
    </div>

    <div class="toolbar absolute bottom-6 left-1/2 -translate-x-1/2 flex bg-slate-800 p-2 rounded-2xl shadow-xl border border-slate-700 backdrop-blur-md gap-1 z-50 items-center">
        <button id="btn-save" class="p-3 text-emerald-400 hover:bg-slate-700 rounded-xl transition-colors" title="Save to Cache"><i data-lucide="save"></i></button>
        <button id="btn-export" class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors" title="Export JSON"><i data-lucide="download"></i></button>
        <label class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors cursor-pointer" title="Import JSON">
            <i data-lucide="upload"></i>
            <input type="file" id="input-import" accept=".json" class="hidden">
        </label>
        
        <div class="w-px h-8 bg-slate-700 mx-1"></div>

        <button id="btn-add" class="p-3 text-slate-200 hover:bg-slate-700 hover:text-white rounded-xl transition-colors" title="Tambah Kotak"><i data-lucide="plus"></i></button>
        <div class="w-px h-8 bg-slate-700 mx-1"></div>
        
        <button id="btn-select" class="p-3 rounded-xl transition-colors bg-blue-600 text-white" title="Pilih & Pindah"><i data-lucide="mouse-pointer-2"></i></button>
        <button id="btn-connect" class="p-3 rounded-xl transition-colors text-slate-200 hover:bg-slate-700" title="Sambungkan"><i data-lucide="link"></i></button>
        <div class="w-px h-8 bg-slate-700 mx-1"></div>
        
        <button id="btn-undo" class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors disabled:opacity-30"><i data-lucide="undo-2"></i></button>
        <button id="btn-redo" class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors disabled:opacity-30"><i data-lucide="redo-2"></i></button>
        <div class="w-px h-8 bg-slate-700 mx-1"></div>
        
        <button id="btn-zoom-out" class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors"><i data-lucide="zoom-out"></i></button>
        <button id="btn-zoom-in" class="p-3 text-slate-200 hover:bg-slate-700 rounded-xl transition-colors"><i data-lucide="zoom-in"></i></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
